<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет администратора</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<div class="admin-container">
    <div class="admin-header">
        <h2>Администратор: <span id="adminName">данные отсутствуют</span></h2>
    </div>

    <div class="admin-main">

        <div class="menu-block">
            <button id="editProfileBtn" class="menu-btn">Редактировать профиль</button>
            <button id="employeesBtn" class="menu-btn">Сотрудники</button>
            <button id="scheduleBtn" class="menu-btn">График работы нарядчиков</button>
            <button id="orderFileBtn" class="menu-btn">Файл наряда</button>
        </div>

        <div class="content-area">
        </div>
    </div>
</div>

<div id="profileModal" class="modal">
    <div class="modal-content">
        <span class="close">x</span>
        <h3>Редактирование профиля</h3>
        <form id="profileForm">
            <label>Фамилия</label>
            <input type="text" id="lastName" placeholder="Введите фамилию">

            <label>Имя</label>
            <input type="text" id="firstName" placeholder="Введите имя">

            <label>Отчество</label>
            <input type="text" id="middleName" placeholder="Введите отчество">

            <label>Должность</label>
            <input type="text" id="position" placeholder="Введите должность">

            <label>Дата вступления в должность</label>
            <input type="date" id="appointmentDate">

            <div class="modal-buttons">
                <button type="button" id="clearProfileBtn" class="btn-clear">Очистить</button>
                <button type="submit" id="saveProfileBtn" class="btn-save">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script src="../js/admin.js"></script>
</body>
</html>
